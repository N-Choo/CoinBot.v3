services:
  deposit-worker:
    build:
      context: .
      dockerfile: deposit-worker/Dockerfile
      target: dev-builder
    command: cargo run -p deposit
    volumes:
      - .:/app
      - /app/target
    env_file:
      - .env
    environment:
      - RUST_LOG=debug
      - GRPC_ADDR=0.0.0.0:50051
    networks:
      - app-network

  deposit-worker-prod:
    image: ghcr.io/blackh-t/coinbot-worker:latest
    build:
      context: .
      dockerfile: deposit-worker/Dockerfile
    env_file:
      - .env
    environment:
      - GRPC_ADDR=0.0.0.0:50051
    networks:
      - app-network
    profiles:
      - prod

  backend-dev:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
      target: dev-builder
    command: cargo run -p api-gateway
    env_file:
      - .env
    ports:
      - "8081:8080"
    volumes:
      - .:/app
      - /app/target
    environment:
      - RUST_LOG=debug
      - GRPC_DEPOSIT_ENDPOINT=http://deposit-worker:50051
    depends_on:
      - deposit-worker
    networks:
      - app-network

  backend:
    image: ghcr.io/blackh-t/coinbot-backend:latest
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=debug
      - GRPC_DEPOSIT_ENDPOINT=http://deposit-worker:50051
    depends_on:
      - deposit-worker
    networks:
      - app-network
    profiles:
      - prod

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./react:/app:Z
      - /app/node_modules
    depends_on:
      - backend-dev
    networks:
      - app-network
    environment:
      - VITE_API_URL=http://localhost:8081

  frontend-prod:
    profiles:
      - prod
    build:
      context: ./react
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
