name: Flear Full-Stack CI

on:
  push:
    branches: [main, "feature/**", "FEAT/**"]
  pull_request:
    branches: [main]

jobs:
  # --- Backend Checks ---
  backend-test:
    name: Rust (Server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2
      - name: Check Format
        run: make fmt
      - name: Clippy (Linter)
        run: make clippy
      - name: Run Tests
        run: make test

  # --- Frontend Checks ---
  frontend-test:
    name: React (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: react/package-lock.json
      - name: Install Dependencies
        run: cd react && npm ci
      - name: Lint
        run: cd react && npm run lint
      - name: Test
        run: cd react && npm run test
      - name: Type Check & Build
        run: cd react && npm run build

  # --- Push ARM64 images to registry (main only) ---
  push-arm:
    name: Build & Push ARM64
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api_gateway/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/coinbot-backend:latest
      - name: Build & push deposit-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deposit-worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/coinbot-worker:latest
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: react/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/coinbot-frontend:latest
